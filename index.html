<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EA Dressage — Preliminary 1.2</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f2ede6;--surface:#faf8f4;--surface2:#f0ece4;--border:#ddd8ce;
  --text:#1c1a17;--text2:#6b6456;--text3:#a09688;
  --navy:#1a3a5c;--navy-light:#e8eef6;--gold:#c9a84c;--gold-light:#fdf3dc;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;}
.header{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;background:var(--navy);flex-shrink:0;gap:10px;flex-wrap:wrap;}
.htitle{font-family:'Playfair Display',serif;font-size:15px;color:#fff;}
.hsub{font-size:10px;color:rgba(255,255,255,0.45);margin-top:1px;}
.hc{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hlbl{font-size:10px;color:rgba(255,255,255,0.5);white-space:nowrap;}
.hbtn{padding:4px 9px;font-size:11px;font-family:'DM Sans',sans-serif;border-radius:6px;border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);cursor:pointer;transition:all 0.15s;}
.hbtn.active{background:var(--gold);border-color:var(--gold);color:#1c1a17;font-weight:500;}
.hbtn:hover:not(.active){background:rgba(255,255,255,0.15);}
.hslider{display:flex;align-items:center;gap:6px;}
input[type=range]{width:80px;accent-color:var(--gold);}
.hval{font-size:11px;color:rgba(255,255,255,0.75);min-width:28px;}
.main{display:flex;flex:1;min-height:0;}
.awrap{flex:1;min-width:0;display:flex;align-items:center;justify-content:center;padding:14px;}
#cv{display:block;border-radius:10px;box-shadow:0 2px 16px rgba(0,0,0,0.1);}
.side{width:300px;flex-shrink:0;display:flex;flex-direction:column;background:var(--surface);border-left:1px solid var(--border);overflow:hidden;}
.mcard{padding:12px 15px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ch{display:flex;align-items:flex-start;gap:9px;margin-bottom:6px;}
.cbadge{width:24px;height:24px;border-radius:50%;background:var(--navy);color:#fff;font-size:11px;font-weight:500;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.clbl{font-size:13px;font-weight:500;color:var(--navy);flex:1;line-height:1.4;}
.ccoeff{font-size:10px;font-weight:600;background:var(--gold-light);color:#7a5a00;border:1px solid #e8c96a;border-radius:5px;padding:2px 7px;white-space:nowrap;flex-shrink:0;}
.cdesc{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:6px;}
.cdir{font-size:11px;color:var(--text2);font-style:italic;line-height:1.5;padding:5px 9px;background:var(--surface2);border-left:2.5px solid var(--gold);border-radius:0 6px 6px 0;margin-bottom:6px;}
.cprompt{display:none;font-size:11px;font-weight:500;color:#92400e;background:#fef3c7;border:1px solid #fcd34d;border-radius:7px;padding:5px 9px;margin-bottom:6px;}
.cprompt.show{display:block;}
.cpills{display:flex;flex-wrap:wrap;gap:4px;}
.pill{display:inline-block;padding:3px 9px;border-radius:999px;font-size:10.5px;font-weight:500;}
.trot{background:#dbeafe;color:#1d4ed8;}.canter{background:#dcfce7;color:#15803d;}
.walk{background:#fef3c7;color:#b45309;}.freewalk{background:#ffedd5;color:#c2410c;}
.halt{background:#fce7f3;color:#be185d;}.stretch{background:#ede9fe;color:#6d28d9;}
.none{background:#f3f4f6;color:#6b7280;}
.ctrls{padding:10px 14px;border-bottom:1px solid var(--border);flex-shrink:0;}
.crow{display:flex;gap:6px;margin-bottom:7px;}
.cb{flex:1;padding:7px 4px;font-size:11.5px;font-family:'DM Sans',sans-serif;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;color:var(--text);transition:background 0.1s;}
.cb:hover{background:var(--surface2);}
#pb{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:500;}
#pb:hover{background:#14304e;}
#lb{background:var(--surface);color:var(--text2);}
#lb.active{background:#e8f5e9;border-color:#4caf50;color:#1b5e20;font-weight:500;}
.progwrap{display:flex;align-items:center;gap:8px;}
.progbg{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.progfill{height:100%;background:var(--navy);border-radius:2px;}
.progtxt{font-size:11px;color:var(--text3);white-space:nowrap;}
.legend{padding:8px 14px;border-bottom:1px solid var(--border);display:flex;flex-wrap:wrap;gap:5px;flex-shrink:0;}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2);}
.ldot{width:8px;height:8px;border-radius:50%;}
.mlist{overflow-y:auto;flex:1;padding:6px;}
.mb{display:flex;align-items:center;gap:7px;width:100%;text-align:left;padding:6px 9px;border-radius:7px;border:1px solid transparent;background:transparent;cursor:pointer;font-size:11px;color:var(--text2);transition:all 0.1s;margin-bottom:2px;font-family:'DM Sans',sans-serif;}
.mb:hover{background:var(--surface2);color:var(--text);}
.mb.active{background:var(--navy-light);border-color:#c5d5e8;color:var(--navy);font-weight:500;}
.mn{font-size:10px;font-weight:600;min-width:15px;color:var(--text3);}
.mb.active .mn{color:var(--navy);}
.mbr{margin-left:auto;}
.mbcoeff{font-size:9px;font-weight:700;color:#7a5a00;background:var(--gold-light);padding:1px 5px;border-radius:4px;}
@media(max-width:680px),(orientation:portrait){
  /* Full screen arena on mobile */
  body{height:100vh;overflow:hidden;}
  .main{flex-direction:column;position:relative;}
  .side{display:none;} /* hide desktop side panel */
  .awrap{padding:0;flex:1;position:relative;}
  #cv{border-radius:0;box-shadow:none;width:100%!important;height:100%!important;}

  /* Floating test selector at top */
  .mobile-tests{
    display:flex;position:absolute;top:8px;left:50%;transform:translateX(-50%);
    gap:6px;z-index:20;
  }
  .mobile-tests button{
    padding:5px 12px;font-size:12px;font-family:'DM Sans',sans-serif;
    border-radius:20px;border:1.5px solid rgba(255,255,255,0.5);
    background:rgba(26,58,92,0.75);color:#fff;cursor:pointer;
    backdrop-filter:blur(4px);font-weight:500;
  }
  .mobile-tests button.active{background:rgba(201,168,76,0.9);border-color:var(--gold);color:#1c1a17;}

  /* Floating movement overlay at bottom */
  .mobile-overlay{
    display:flex;flex-direction:column;
    position:absolute;bottom:70px;left:10px;right:10px;
    background:rgba(26,58,92,0.82);backdrop-filter:blur(6px);
    border-radius:12px;padding:8px 12px;z-index:20;
    border:1px solid rgba(255,255,255,0.15);
    transition:all 0.2s;
  }
  .mob-top{display:flex;align-items:center;gap:8px;}
  .mob-num{
    width:22px;height:22px;border-radius:50%;
    background:rgba(255,255,255,0.15);color:#fff;
    font-size:11px;font-weight:600;
    display:flex;align-items:center;justify-content:center;flex-shrink:0;
  }
  .mob-label{font-size:12px;font-weight:500;color:#fff;flex:1;line-height:1.3;}
  .mob-expand{
    background:none;border:none;color:rgba(255,255,255,0.5);
    font-size:14px;cursor:pointer;padding:0 2px;flex-shrink:0;
  }
  .mob-pills{display:flex;gap:4px;margin-top:5px;flex-wrap:wrap;}
  .mob-details{
    display:none;margin-top:6px;
    font-size:11px;color:rgba(255,255,255,0.75);line-height:1.5;
    border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;
  }
  .mob-details.show{display:block;}

  /* Floating controls at bottom */
  .mobile-controls{
    position:absolute;bottom:12px;left:50%;transform:translateX(-50%);
    display:flex;gap:10px;z-index:20;
  }
  .mob-btn{
    width:46px;height:46px;border-radius:50%;
    border:1.5px solid rgba(255,255,255,0.3);
    background:rgba(26,58,92,0.82);backdrop-filter:blur(4px);
    color:#fff;font-size:16px;cursor:pointer;
    display:flex;align-items:center;justify-content:center;
  }
  .mob-btn.play{background:rgba(201,168,76,0.9);border-color:var(--gold);color:#1c1a17;width:54px;height:54px;font-size:18px;}
  .mob-btn.loop-on{background:rgba(76,175,80,0.8);border-color:#4caf50;}

  /* Hide header controls on mobile */
  .hc{display:none;}
  .header{padding:7px 12px;}
  .htitle{font-size:13px;}
  .hsub{display:none;}
}
</style>

<!-- Mobile UI elements (hidden on desktop) -->
<div class="mobile-tests" id="mob-tests" style="display:none">
  <button id="mob-t12" onclick="switchTest('1.2')" class="active">Prelim 1.2</button>
  <button id="mob-t13" onclick="switchTest('1.3')">Prelim 1.3</button>
  <button id="mob-tevb" onclick="switchTest('evb')">Ev Test B</button>
</div>

<div class="mobile-overlay" id="mob-overlay" style="display:none">
  <div class="mob-top">
    <div class="mob-num" id="mob-num">·</div>
    <div class="mob-label" id="mob-label">—</div>
    <button class="mob-expand" id="mob-expand" onclick="toggleMobExpand()">▾</button>
  </div>
  <div class="mob-pills" id="mob-pills"></div>
  <div class="mob-details" id="mob-details"></div>
</div>

<div class="mobile-controls" id="mob-controls" style="display:none">
  <button class="mob-btn" onclick="userPrev()">←</button>
  <button class="mob-btn play" id="mob-pb" onclick="togglePlay()">▶</button>
  <button class="mob-btn" onclick="userNext()">→</button>
  <button class="mob-btn" id="mob-lb" onclick="toggleLoop()">↺</button>
</div>
</head>
<body>
<div class="header">
  <div><div class="htitle" id="htitle">Preliminary 1.2 · Equestrian Australia</div>
  <div class="hsub" id="hsub">Effective 1 January 2023 · 60 × 20m arena</div></div>
  <div class="hc">
    <span class="hlbl">Test</span>
    <button class="hbtn active" id="t12" onclick="switchTest('1.2')">Prelim 1.2</button>
    <button class="hbtn" id="t13" onclick="switchTest('1.3')">Prelim 1.3</button>
    <button class="hbtn" id="tevb" onclick="switchTest('evb')">Ev Test B</button>
    <span class="hlbl" style="margin-left:4px;">Mode</span>
    <button class="hbtn active" id="m-uniform" onclick="setMode('uniform')">Uniform</button>
    <button class="hbtn" id="m-relative" onclick="setMode('relative')">Relative</button>
    <button class="hbtn" id="m-timed" onclick="setMode('timed')">Timed</button>
    <div class="hslider">
      <span class="hlbl">Speed</span>
      <input type="range" id="spslider" min="20" max="1000" value="800" step="5" oninput="setSpeed(+this.value)">
      <span class="hval" id="spval">8×</span>
    </div>
    <button class="hbtn active" id="exit-toggle" onclick="toggleExit()">Exit: On</button>
  </div>
</div>
<div class="main">
  <div class="awrap"><canvas id="cv"></canvas></div>
  <div class="side">
    <div class="mcard">
      <div class="ch">
        <div class="cbadge" id="dn">·</div>
        <div class="clbl" id="dl">—</div>
        <div class="ccoeff" id="dc" style="display:none"></div>
      </div>
      <div class="cdesc" id="dd"></div>
      <div class="cprompt" id="dp"></div>
      <div class="cprompt" id="coeff-warn" style="display:none;background:#fdf3dc;border-color:#c9a84c;color:#7a5a00;"></div>
      <div class="cdir" id="ddir"></div>
      <div class="cpills" id="dg"></div>
    </div>
    <div class="ctrls">
      <div class="crow">
        <button class="cb" onclick="userPrev()">← Prev</button>
        <button class="cb" id="pb" onclick="togglePlay()">▶ Play</button>
        <button class="cb" onclick="userNext()">Next →</button>
      </div>
      <div class="crow">
        <button class="cb" id="lb" onclick="toggleLoop()">↺ Loop: Off</button>
      </div>
      <div class="progwrap">
        <div class="progbg"><div class="progfill" id="pf" style="width:0%"></div></div>
        <span class="progtxt" id="pt">· / 16</span>
        <span class="progtxt" id="substep" style="margin-left:4px;color:var(--gold);"></span>
      </div>
    </div>
    <div class="legend">
      <div class="leg"><div class="ldot" style="background:#2563eb"></div>Working trot</div>
      <div class="leg"><div class="ldot" style="background:#16a34a"></div>Canter</div>
      <div class="leg"><div class="ldot" style="background:#d97706"></div>Med. walk</div>
      <div class="leg"><div class="ldot" style="background:#ea580c"></div>Free walk</div>
      <div class="leg"><div class="ldot" style="background:#db2777"></div>Halt</div>
      <div class="leg"><div class="ldot" style="background:#7c3aed"></div>Stretch</div>
    </div>
    <div class="mlist" id="ml"></div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════
// COORDINATE SYSTEM
// Real world: A=(0,0) bottom, C=(0,arenaLen) top, 20m wide
// Canvas Y flipped: canvasY = OY + (arenaLen−realY)*SC
// toC defined in sizeCanvas section below
// ═══════════════════════════════════════════════════
const cv=document.getElementById('cv');
const ctx=cv.getContext('2d');
let SC=1,OX=0,OY=0;
function toC(x,y){return[OX+x*SC, OY+(arenaLen-y)*SC];}

// ─── KEY OFFSET COORDINATES ─────────────────────────
// All horse path coords — 0.75m inside boundary
// Boundary fence at x=±10, y=0, y=60
// Horse path at x=±9.25, y=0.75, y=59.25
const O=0.75;   // offset from boundary
const OB=9.25;  // offset boundary x (10 - 0.75)

// Offset corner points of the horse path rectangle
const BL=[-OB, O];      // bottom-left
const BR=[ OB, O];      // bottom-right
const TL=[-OB, 60-O];   // top-left
const TR=[ OB, 60-O];   // top-right

// Offset A and C (on centreline, offset in Y only)
const Ao=[0, O];        // A offset  (0, 0.75)
const Co=[0, 60-O];     // C offset  (0, 59.25)

// Compass waypoints around A — for clean corner arcing at A
const AE=[ O,  O];      // A-East  (0.75, 0.75)  — right side approach to A
const AW=[-O,  O];      // A-West  (-0.75, 0.75) — left side approach to A
const AN=[ 0,  O*2];    // A-North (0, 1.5)       — departure north from A (direction hint)

// Compass waypoints around C — for clean corner arcing at C
const CE=[ O,  60-O];   // C-East  (0.75, 59.25)
const CW_=[-O, 60-O];   // C-West  (-0.75, 59.25) (CW_ to avoid clash with Math reserved names)
const CS=[ 0,  60-O*2]; // C-South (0, 58.5)       — departure south from C

// Named marker offset positions (on long sides, x already at ±9.25)
const Ko=[-OB, 6];
const Eo=[-OB, 30];
const Ho=[-OB, 54];
const Mo=[ OB, 54];
const Bo=[ OB, 30];
const Fo=[ OB, 6];
const Xo=[ 0,  30];

// Additional centreline markers
const Do=[ 0,  6];   // D — same Y as K and F
const Lo=[ 0,  18];  // L
const Io=[ 0,  42];  // I
const Go=[ 0,  54];  // G — same Y as H and M

// Additional long side markers
const Vo=[-OB, 18];  // V — left, 18m from A
const Po=[ OB, 18];  // P — right, 18m from A
const So=[-OB, 42];  // S — left, 42m from A
const Ro=[ OB, 42];  // R — right, 42m from A

// Display positions (on fence, for marker squares)
const FENCE={
  // Primary
  A:[0,0],K:[-10,6],E:[-10,30],H:[-10,54],
  C:[0,60],M:[10,54],B:[10,30],F:[10,6],
  // Secondary centreline
  X:[0,30],G:[0,54],I:[0,42],L:[0,18],D:[0,6],
  // Secondary long side
  V:[-10,18],S:[-10,42],R:[10,42],P:[10,18]
};

// ─── GAIT COLOURS & SPEEDS ──────────────────────────
const GC={
  trot:'#2563eb',canter:'#16a34a',walk:'#d97706',
  freewalk:'#ea580c',halt:'#db2777',stretch:'#7c3aed',none:'#aaa'
};
const GL={
  trot:'Working trot',canter:'Working canter',walk:'Medium walk',
  freewalk:'Free walk on long rein',halt:'Halt / Salute',
  stretch:'Stretch trot (rising)',none:'Approach'
};
// CSS class names for gait pills
const GS={
  trot:'trot',canter:'canter',walk:'walk',freewalk:'freewalk',
  halt:'halt',stretch:'stretch',none:'none'
};
// m/s
const GSPEED={walk:1.111,freewalk:1.111,trot:2.222,canter:3.333,stretch:2.222,halt:0,none:1.5};

// ─── SEGMENT BUILDERS ───────────────────────────────
// arc: path with corner arcs (boundary riding)
// line: straight line (diagonals, centreline)
// grad: path that transitions gait colour along it (for "between" transitions)
// circle: parametric circle
// halt: pause at point

function arc(pts,g){return{t:'arc',pts,g};}
function line(pts,g){return{t:'line',pts,g};}
function grad(pts,g1,g2,f){return{t:'grad',pts,g1,g2,f};}
function circ(cx,cy,r,startDeg,ccw,g,sweep){return{t:'circle',cx,cy,r,startDeg,ccw,g,sweep:sweep||360};}
function halt(pt){return{t:'halt',pt};}
// Quadratic bezier: start, control, end — for smooth loops (H→K, M→F)
function bezier(start,ctrl,end,g){return{t:'bezier',pts:[start,ctrl,end],g};}

// ═══════════════════════════════════════════════════
// MOVEMENT DATA — fully explicit offset coords
// ═══════════════════════════════════════════════════
const MOVES_12=[

{n:0,label:'Approach',
 desc:'Horse and rider wait outside the arena below A, ready to enter.',
 gait:'none',dir:'',coeff:1,
 segs:[line([[0,-5],[0,0]],'none')]},

{n:1,label:'A → X · Halt, salute',
 desc:'Enter centreline in working trot. Halt at X, salute (min. 3 sec). Proceed in working trot.',
 gait:'trot',coeff:1,
 dir:'Regularity and quality of trot; willing, calm transitions; straightness; attentiveness; immobility (min. 3 seconds).',
 segs:[
   line([[0,0],Xo],'trot'),
   halt(Xo),
 ]},

{n:2,label:'C → M → B · circle right 20m · B → F → A → K',
 desc:'Proceed centreline X→C. Track right at C. Boundary C→M→B. 20m circle right at B, centre X, radius 9.25m. Continue boundary B→F→A→K.',
 gait:'trot',coeff:1,
 dir:'Regularity and quality of trot; shape and size of circle; bend; balance.',
 segs:[
   line([Xo,CS],'trot'),                              // centreline X→CS (approach C from south)
   arc([CS,Co,TR,Mo,Bo],'trot'),                      // CS→Co arc→TR→M→B
   circ(0,30,9.25,0,false,'trot'),
   arc([Bo,BR,AE,AW,BL,Ko],'trot'),                  // boundary B→F→A→K via AE(arrive) AW(depart)
 ]},

{n:3,label:'K–X–M · change rein at M · M–C',
 desc:'Diagonal K→X→M in working trot. At M change rein (left/CCW). Boundary M→C.',
 gait:'trot',coeff:2,
 dir:'Regularity and quality of trot; straightness; bend and balance in corner.',
 prompt:'↔ Change rein at M — prepare',
 promptMarker:Mo,promptDist:6,
 segs:[
   line([Ko,Xo,Mo],'trot'),
   arc([Mo,TR,Co],'trot'),
 ]},

{n:4,label:'Between C & H · canter left · H–E',
 desc:'Transition to working canter left lead between C and H. Continue boundary H→E.',
 gait:'canter',coeff:2,
 dir:'Willing, calm transition; regularity and quality of canter; bend and balance in corner; straightness.',
 segs:[
   grad([Co,TL,Ho],'trot','canter',0.5),             // boundary C→H, trot→canter gradient
   arc([Ho,Eo],'canter'),                             // boundary H→E
 ]},

{n:5,label:'E · 20m circle left',
 desc:'20m circle left (CCW) at E. Centre X (0,30), radius 9.25m. Touches E(−9.25,30), (0,39.25), B(+9.25,30), (0,20.75).',
 gait:'canter',coeff:1,
 dir:'Regularity and quality of canter; shape and size of circle; bend; balance.',
 segs:[
   circ(0,30,9.25,180,true,'canter'),                // start 180°=E(−9.25,30), CCW
 ]},

{n:6,label:'Between E & K · working trot · K–A',
 desc:'Transition to working trot between E and K. Continue boundary K→A.',
 gait:'trot',coeff:1,
 dir:'Willing, calm transition; regularity and quality of trot; straightness, bend and balance in corner.',
 segs:[
   grad([Eo,Ko],'canter','trot',0.5),
   arc([Ko,BL,AW],'trot'),                            // boundary K→BL corner→AW (arrive at A west)
 ]},

{n:7,label:'A · 20m circle left (stretch) · A–F',
 desc:'20m circle left at A in rising stretch trot. Centre (0,10), radius 9.25m, starts at (0,0.75). Shorten reins before returning to A. Continue A→F.',
 gait:'stretch',coeff:1,
 dir:'Forward and downward stretch over the back into a light contact; bend; shape and size of circle; willing, calm transitions.',
 prompt:'⚠️ Shorten reins — returning to A',
 promptMarker:Ao,promptDist:7,
 segs:[
   circ(0,10,9.25,270,true,'stretch'),
   arc([AE,BR,Fo],'trot'),
 ]},

{n:8,label:'F · medium walk · diagonal F–E',
 desc:'Transition to medium walk at F. Diagonal F→E (direct line across arena).',
 gait:'walk',coeff:2,
 dir:'Willing, calm transition; regularity and quality of walk.',
 segs:[
   line([Fo,Eo],'walk'),                              // diagonal direct
 ]},

{n:9,label:'E · change rein · free walk E–M · change rein · medium walk M–C',
 desc:'At E change rein (right/CW). Diagonal E→M free walk on long rein. At M change rein (left/CCW). Boundary M→C medium walk.',
 gait:'freewalk',coeff:2,

const arenaLen=60;

let MOVES=MOVES_12;

const TEST_META={
  '1.2':{title:'Preliminary 1.2 · Equestrian Australia',sub:'Effective 1 January 2023',time:330,moves:MOVES_12},
  '1.3':{title:'Preliminary 1.3 · Equestrian Australia',sub:'Effective 1 January 2023',time:330,moves:MOVES_13},

};

function getActiveMoves(){
  const base=TEST_META[activeTest].moves;
  if(showExit) return base;
  const m=[...base];
  const last={...m[m.length-1],segs:[...m[m.length-1].segs]};
  const haltIdx=last.segs.findIndex(s=>s.t==='halt');
  if(haltIdx>=0) last.segs=last.segs.slice(0,haltIdx+1);
  m[m.length-1]=last;
  return m;
}

function switchTest(id){
  activeTest=id;
  MOVES=getActiveMoves();
  moveCompletedAt.length=0;
  for(let i=0;i<MOVES.length;i++) moveCompletedAt.push(null);
  const meta=TEST_META[id];
  document.getElementById('htitle').textContent=meta.title;
  document.getElementById('hsub').textContent=`${meta.sub} · ${arenaLen} × 20m arena`;
  ['12','13','evb'].forEach(t=>{
    document.getElementById('t'+t)?.classList.toggle('active',t===id.replace('.',''));
  });
  buildList();
  startAnim(0,false);
}

// CANVAS SIZING
// ═══════════════════════════════════════════════════
function sizeCanvas(){
  const wrap=document.querySelector('.awrap');
  const W=wrap.clientWidth,H=wrap.clientHeight;
  const AL=arenaLen;
  const extraY=8;
  const sX=(W-64)/20,sY=(H-20)/(AL+extraY);
  SC=Math.min(sX,sY);
  cv.width=20*SC+64;
  cv.height=(AL+extraY)*SC+20;
  OX=32+10*SC;
  OY=10+3*SC;
}

// ═══════════════════════════════════════════════════
// ARENA DRAWING
// ═══════════════════════════════════════════════════
function drawArena(){
  ctx.clearRect(0,0,cv.width,cv.height);
  ctx.fillStyle='#ede8e0';
  ctx.fillRect(0,0,cv.width,cv.height);

  // Sand surface — use arenaLen for top
  const[ax,ay]=toC(-10,arenaLen),[bx,by]=toC(10,0);
  ctx.fillStyle='#f0e4c0';
  ctx.fillRect(ax,ay,bx-ax,by-ay);
  ctx.strokeStyle='#8a7050';ctx.lineWidth=1.5;
  ctx.strokeRect(ax,ay,bx-ax,by-ay);

  // Offset boundary
  const[ox1,oy1]=toC(-OB,arenaLen-O),[ox2,oy2]=toC(OB,O);
  ctx.strokeStyle='rgba(100,80,40,0.18)';ctx.lineWidth=0.8;ctx.setLineDash([3,4]);
  ctx.strokeRect(ox1,oy1,ox2-ox1,oy2-oy1);
  ctx.setLineDash([]);

  // Centre lines (dashed)
  ctx.setLineDash([4,5]);ctx.strokeStyle='#d8c898';ctx.lineWidth=0.8;
  const[cx0,cy0]=toC(0,0);const[,cy60]=toC(0,60);
  ctx.beginPath();ctx.moveTo(cx0,cy60);ctx.lineTo(cx0,cy0);ctx.stroke();
  const[lx,lym]=toC(-10,30);const[rx]=toC(10,30);
  ctx.beginPath();ctx.moveTo(lx,lym);ctx.lineTo(rx,lym);ctx.stroke();
  ctx.setLineDash([]);

  // Secondary markers — very faint grey, reference only
  const sec={
    X:FENCE.X, G:FENCE.G, I:FENCE.I, L:FENCE.L, D:FENCE.D,
    V:FENCE.V, S:FENCE.S, R:FENCE.R, P:FENCE.P
  };
  const fs2=Math.max(7,SC*0.38);
  ctx.font=`${fs2}px DM Sans,sans-serif`;
  ctx.fillStyle='#ccc8b8';ctx.textAlign='center';ctx.textBaseline='middle';
  for(const[n,p] of Object.entries(sec)){
    const[px,py]=toC(p[0],p[1]);
    let ox=0,oy=0;
    if(p[0]<0)ox=-fs2*1.4; else if(p[0]>0)ox=fs2*1.4;
    if(p[1]===0)oy=fs2*1.4; else if(p[1]===60)oy=-fs2*1.4;
    // Small dot on boundary/centreline
    ctx.beginPath();ctx.arc(px,py,1.5,0,Math.PI*2);
    ctx.fillStyle='#d8d0b8';ctx.fill();
    // Letter label
    ctx.fillStyle='#c8c0a8';
    ctx.fillText(n,px+(ox||8),py+(oy||-6));
  }

  // Primary markers
  const fs=Math.max(10,SC*0.62);
  ctx.font=`bold ${fs}px Playfair Display,serif`;
  for(const[n,p] of Object.entries({A:FENCE.A,K:FENCE.K,E:FENCE.E,H:FENCE.H,C:FENCE.C,M:FENCE.M,B:FENCE.B,F:FENCE.F})){
    const[px,py]=toC(p[0],p[1]);
    let ox=0,oy=0;
    if(p[0]<0)ox=-fs*1.5;else if(p[0]>0)ox=fs*1.5;
    if(p[1]===0)oy=fs*1.4;else if(p[1]===60)oy=-fs*1.4;
    ctx.fillStyle='#1a3a5c';ctx.fillRect(px-4,py-4,8,8);
    ctx.fillStyle='#fff';ctx.fillRect(px-3,py-3,6,6);
    ctx.fillStyle='#1a3a5c';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(n,px+ox,py+oy);
  }

  // X marker
  const[xx,xy]=toC(0,30);
  ctx.font=`${Math.max(9,SC*0.52)}px DM Sans,sans-serif`;
  ctx.fillStyle='#a09070';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.fillText('X',xx+9,xy-8);
  ctx.beginPath();ctx.arc(xx,xy,2.5,0,Math.PI*2);ctx.fillStyle='#c0b080';ctx.fill();

  // Start marker
  const[sx,sy]=toC(0,-5);
  ctx.strokeStyle='#bbb';ctx.lineWidth=1;ctx.setLineDash([3,4]);
  ctx.beginPath();ctx.moveTo(sx,sy+10);ctx.lineTo(sx,toC(0,0)[1]);ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle='#aaa';ctx.font=`${Math.max(9,SC*0.48)}px DM Sans,sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText('start',sx,sy);
}

// ═══════════════════════════════════════════════════
// PATH DRAWING WITH CORNER ARCS
// CR = corner radius in metres
// ═══════════════════════════════════════════════════
const CR=0.75;

function buildArcCmds(pts){
  const n=pts.length;
  if(n<2)return[];
  const R=CR*SC;
  const cp=pts.map(p=>toC(p[0],p[1]));
  const cmds=[{t:'M',p:cp[0]}];
  for(let i=1;i<n;i++){
    if(i<n-1){
      const pr=cp[i-1],cu=cp[i],nx=cp[i+1];
      const d1=Math.hypot(cu[0]-pr[0],cu[1]-pr[1]);
      const d2=Math.hypot(nx[0]-cu[0],nx[1]-cu[1]);
      if(d1<0.001||d2<0.001){cmds.push({t:'L',p:cu});continue;}
      const t=Math.min(R,d1*0.45,d2*0.45);
      const u1x=(cu[0]-pr[0])/d1,u1y=(cu[1]-pr[1])/d1;
      const u2x=(nx[0]-cu[0])/d2,u2y=(nx[1]-cu[1])/d2;
      cmds.push({t:'L',p:[cu[0]-u1x*t,cu[1]-u1y*t]});
      cmds.push({t:'Q',c:cu,p:[cu[0]+u2x*t,cu[1]+u2y*t]});
    } else {
      cmds.push({t:'L',p:cp[i]});
    }
  }
  return cmds;
}

function cmdsTotalLen(cmds){
  let len=0;
  for(let i=1;i<cmds.length;i++){
    const a=cmds[i-1],b=cmds[i];
    const p1=a.p,p2=b.p;
    len+=b.t==='Q'?Math.hypot(p2[0]-p1[0],p2[1]-p1[1])*1.12:Math.hypot(p2[0]-p1[0],p2[1]-p1[1]);
  }
  return len;
}

function drawCmds(cmds,progress,color,alpha,lw){
  if(!cmds.length)return;
  const total=cmdsTotalLen(cmds);
  const target=total*progress;
  let drawn=0;
  ctx.globalAlpha=alpha;ctx.strokeStyle=color;
  ctx.lineWidth=lw||(alpha===1?2.5:1.5);ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(cmds[0].p[0],cmds[0].p[1]);
  for(let i=1;i<cmds.length;i++){
    const cmd=cmds[i],prev=cmds[i-1];
    const p1=prev.p,p2=cmd.p;
    const sl=cmd.t==='Q'?Math.hypot(p2[0]-p1[0],p2[1]-p1[1])*1.12:Math.hypot(p2[0]-p1[0],p2[1]-p1[1]);
    if(drawn+sl<=target){
      if(cmd.t==='L')ctx.lineTo(p2[0],p2[1]);
      else ctx.quadraticCurveTo(cmd.c[0],cmd.c[1],p2[0],p2[1]);
      drawn+=sl;
    } else {
      const t2=(target-drawn)/sl;
      if(cmd.t==='L'){
        ctx.lineTo(p1[0]+(p2[0]-p1[0])*t2,p1[1]+(p2[1]-p1[1])*t2);
      } else {
        const c=cmd.c;
        const mx=p1[0]+(c[0]-p1[0])*t2,my=p1[1]+(c[1]-p1[1])*t2;
        const nx=c[0]+(p2[0]-c[0])*t2,ny=c[1]+(p2[1]-c[1])*t2;
        ctx.quadraticCurveTo(mx,my,mx+(nx-mx)*t2,my+(ny-my)*t2);
      }
      break;
    }
  }
  ctx.stroke();ctx.globalAlpha=1;
}

function getPosFromCmds(cmds,progress){
  if(!cmds.length)return null;
  const total=cmdsTotalLen(cmds);
  const target=total*progress;
  let drawn=0,lastP=cmds[0].p;
  for(let i=1;i<cmds.length;i++){
    const cmd=cmds[i],prev=cmds[i-1];
    const p1=prev.p,p2=cmd.p;
    const sl=cmd.t==='Q'?Math.hypot(p2[0]-p1[0],p2[1]-p1[1])*1.12:Math.hypot(p2[0]-p1[0],p2[1]-p1[1]);
    if(drawn+sl<=target){lastP=p2;drawn+=sl;}
    else{
      const t2=(target-drawn)/sl;
      if(cmd.t==='L')return[p1[0]+(p2[0]-p1[0])*t2,p1[1]+(p2[1]-p1[1])*t2];
      const c=cmd.c;
      const mx=p1[0]+(c[0]-p1[0])*t2,my=p1[1]+(c[1]-p1[1])*t2;
      const nx=c[0]+(p2[0]-c[0])*t2,ny=c[1]+(p2[1]-c[1])*t2;
      return[mx+(nx-mx)*t2,my+(ny-my)*t2];
    }
  }
  return lastP;
}

// Simple line path (no corner arcs — for diagonals, centreline)
function drawLinePath(pts,g,progress,alpha,lw){
  const n=pts.length,cp=pts.map(p=>toC(p[0],p[1]));
  const segs=n-1,drawn=progress*segs;
  ctx.globalAlpha=alpha;ctx.strokeStyle=GC[g]||'#999';
  ctx.lineWidth=lw||(alpha===1?2.5:1.5);ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(cp[0][0],cp[0][1]);
  for(let i=1;i<=segs;i++){
    const t=Math.min(1,Math.max(0,drawn-(i-1)));
    if(t<=0)break;
    ctx.lineTo(cp[i-1][0]+(cp[i][0]-cp[i-1][0])*t,cp[i-1][1]+(cp[i][1]-cp[i-1][1])*t);
  }
  ctx.stroke();ctx.globalAlpha=1;
}

function getLinePosAt(pts,progress){
  const n=pts.length,cp=pts.map(p=>toC(p[0],p[1]));
  const segs=n-1,drawn=progress*segs;
  const s=Math.min(segs-1,Math.floor(drawn)),t=drawn-s;
  return[cp[s][0]+(cp[s+1][0]-cp[s][0])*t,cp[s][1]+(cp[s+1][1]-cp[s][1])*t];
}

// Gradient segment — draws two overlapping strokes with alpha fade at transition point

// Better gradient: draw full path in g2, then overdraw beginning in g1
function drawGradPathV2(pts,g1,g2,transF,progress,alpha,lw){
  const cmds=buildArcCmds(pts);
  if(!cmds.length)return;
  if(progress<=transF){
    drawCmds(cmds,progress,GC[g1],alpha,lw);
  } else {
    drawCmds(cmds,progress,GC[g2],alpha,lw);
    drawCmds(cmds,transF,GC[g1],alpha,lw);
  }
}

// Parametric circle — pure trig, no ctx.arc winding issues
const CSTEPS=120;
function circlePoints(cx,cy,r,startDeg,ccw,sweep){
  sweep=sweep||360;
  const pts=[];
  for(let i=0;i<=CSTEPS;i++){
    const a=(startDeg+(ccw?sweep:-sweep)*(i/CSTEPS))*Math.PI/180;
    pts.push(toC(cx+r*Math.cos(a),cy+r*Math.sin(a)));
  }
  return pts;
}

function drawCircleSeg(seg,progress,alpha){ drawCircleSegW(seg,progress,alpha,null); }

function drawCircleSegW(seg,progress,alpha,lw){
  const pts=circlePoints(seg.cx,seg.cy,seg.r,seg.startDeg,seg.ccw,seg.sweep);
  const n=Math.max(2,Math.floor(progress*CSTEPS)+1);
  ctx.globalAlpha=alpha;ctx.strokeStyle=GC[seg.g];
  ctx.lineWidth=lw||(alpha===1?2.5:1.5);ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<n;i++)ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();ctx.globalAlpha=1;
}

function getCirclePos(seg,progress){
  const sweep=seg.sweep||360;
  const a=(seg.startDeg+(seg.ccw?sweep:-sweep)*progress)*Math.PI/180;
  return toC(seg.cx+seg.r*Math.cos(a),seg.cy+seg.r*Math.sin(a));
}

// ─── Quadratic bezier segment ────────────────────────
// pts[0]=start, pts[1]=control, pts[2]=end (real-world coords)
// Sampled parametrically — horse dot stays perfectly in sync
const BSTEPS=120;

function bezierPoint(p0,p1,p2,t){
  // Q(t) = (1-t)²P0 + 2(1-t)tP1 + t²P2
  const mt=1-t;
  return[
    mt*mt*p0[0]+2*mt*t*p1[0]+t*t*p2[0],
    mt*mt*p0[1]+2*mt*t*p1[1]+t*t*p2[1]
  ];
}

function bezierCanvasPoints(seg){
  const[p0,p1,p2]=seg.pts;
  const pts=[];
  for(let i=0;i<=BSTEPS;i++){
    const p=bezierPoint(p0,p1,p2,i/BSTEPS);
    pts.push(toC(p[0],p[1]));
  }
  return pts;
}

function drawBezierSeg(seg,progress,alpha,lw){
  const pts=bezierCanvasPoints(seg);
  const n=Math.max(2,Math.floor(progress*BSTEPS)+1);
  ctx.globalAlpha=alpha;ctx.strokeStyle=GC[seg.g]||'#999';
  ctx.lineWidth=lw||(alpha===1?2.5:1.5);ctx.lineCap='round';ctx.lineJoin='round';
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  for(let i=1;i<n;i++) ctx.lineTo(pts[i][0],pts[i][1]);
  ctx.stroke();ctx.globalAlpha=1;
}

function getBezierPos(seg,progress){
  const[p0,p1,p2]=seg.pts;
  const p=bezierPoint(p0,p1,p2,progress);
  return toC(p[0],p[1]);
}

function bezierLenM(seg){
  // Approximate arc length by sampling
  const[p0,p1,p2]=seg.pts;
  let len=0;
  let prev=p0;
  for(let i=1;i<=BSTEPS;i++){
    const p=bezierPoint(p0,p1,p2,i/BSTEPS);
    len+=Math.hypot(p[0]-prev[0],p[1]-prev[1]);
    prev=p;
  }
  return len;
}

// ─── Draw / position any segment ────────────────────
function drawSeg(seg,progress,alpha,pulse,now){
  if(pulse&&alpha===1&&seg.t!=='halt'){
    const t=now||performance.now();
    const pulseAlpha=0.25+0.2*Math.sin(t*0.004);
    const pulseColor=GC[seg.t==='grad'?(progress<seg.f?seg.g1:seg.g2):seg.g]||'#c9a84c';
    if(seg.t==='arc') drawCmds(buildArcCmds(seg.pts),progress,pulseColor,pulseAlpha*alpha,6);
    else if(seg.t==='line') drawLinePath(seg.pts,seg.g,progress,pulseAlpha*alpha,6);
    else if(seg.t==='grad') drawGradPathV2(seg.pts,seg.g1,seg.g2,seg.f,progress,pulseAlpha*alpha,6);
    else if(seg.t==='circle') drawCircleSegW(seg,progress,pulseAlpha*alpha,6);
    else if(seg.t==='bezier') drawBezierSeg(seg,progress,pulseAlpha*alpha,6);
  }
  if(seg.t==='arc') drawCmds(buildArcCmds(seg.pts),progress,GC[seg.g],alpha);
  else if(seg.t==='line') drawLinePath(seg.pts,seg.g,progress,alpha);
  else if(seg.t==='grad') drawGradPathV2(seg.pts,seg.g1,seg.g2,seg.f,progress,alpha);
  else if(seg.t==='circle') drawCircleSeg(seg,progress,alpha);
  else if(seg.t==='bezier') drawBezierSeg(seg,progress,alpha);
  else if(seg.t==='halt'){
    const[hx,hy]=toC(seg.pt[0],seg.pt[1]);
    ctx.globalAlpha=alpha;ctx.fillStyle=GC.halt;
    ctx.beginPath();ctx.arc(hx,hy,7*Math.min(1,progress*3),0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

function getSegPos(seg,progress){
  if(seg.t==='arc') return getPosFromCmds(buildArcCmds(seg.pts),progress);
  if(seg.t==='line') return getLinePosAt(seg.pts,progress);
  if(seg.t==='grad') return getPosFromCmds(buildArcCmds(seg.pts),progress);
  if(seg.t==='circle') return getCirclePos(seg,progress);
  if(seg.t==='bezier') return getBezierPos(seg,progress);
  if(seg.t==='halt') return toC(seg.pt[0],seg.pt[1]);
  return null;
}

function getSegGait(seg,progress){
  if(seg.t==='grad') return progress<seg.f?seg.g1:seg.g2;
  return seg.g||'trot';
}

function drawHorse(pos,g,coeff,now){
  if(!pos)return;
  const c=GC[g]||'#999';
  if(coeff&&coeff>1){
    const t=now||performance.now();
    const r=10+2*Math.sin(t*0.005);
    const goldAlpha=0.5+0.3*Math.sin(t*0.005);
    // Pulsing gold ring
    ctx.globalAlpha=goldAlpha;
    ctx.strokeStyle='#c9a84c';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(pos[0],pos[1],r,0,Math.PI*2);ctx.stroke();
    // Second outer ring at different phase
    ctx.strokeStyle='#c9a84c';ctx.lineWidth=1;
    ctx.globalAlpha=goldAlpha*0.4;
    ctx.beginPath();ctx.arc(pos[0],pos[1],r+4,0,Math.PI*2);ctx.stroke();
    ctx.globalAlpha=1;
    // Coefficient label — plain text, gold with dark shadow
    const label=`×${coeff}`;
    const fs=Math.max(10,SC*0.55);
    ctx.font=`bold ${fs}px DM Sans,sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    const bx=pos[0]+14,by=pos[1]-14;
    ctx.shadowColor='rgba(0,0,0,0.8)';ctx.shadowBlur=3;
    ctx.fillStyle='#1a1200';
    ctx.fillText(label,bx+0.5,by+0.5);
    ctx.shadowBlur=0;
    ctx.fillStyle='#c9a84c';
    ctx.fillText(label,bx,by);
  }
  ctx.shadowColor=c;ctx.shadowBlur=10;
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(pos[0],pos[1],7,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;
  ctx.fillStyle=c;ctx.beginPath();ctx.arc(pos[0],pos[1],5,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#fff';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(pos[0],pos[1],7,0,Math.PI*2);ctx.stroke();
}

// ═══════════════════════════════════════════════════
// SPEED & TIMING
// ═══════════════════════════════════════════════════
let speedMode='uniform',speedMult=8;
const HALT_MS=2000;

function pathLenM(pts){
  let len=0;
  for(let i=1;i<pts.length;i++) len+=Math.hypot(pts[i][0]-pts[i-1][0],pts[i][1]-pts[i-1][1]);
  return len;
}

function segLenM(seg){
  if(seg.t==='halt')return 0;
  if(seg.t==='circle')return 2*Math.PI*seg.r*((seg.sweep||360)/360);
  if(seg.t==='bezier')return bezierLenM(seg);
  return pathLenM(seg.pts);
}

function segDurMs(seg){
  if(seg.t==='halt')return HALT_MS/speedMult;
  const len=segLenM(seg);
  if(len<0.001)return 50;
  let mps;
  if(speedMode==='uniform'){
    mps=GSPEED.trot;
  } else {
    const g=seg.t==='grad'?seg.g2:seg.g;
    mps=GSPEED[g]||GSPEED.trot;
  }
  if(speedMode==='timed'){
    const testTime=TEST_META[activeTest]?.time||330;
    const totalM=MOVES.reduce((s,m)=>s+m.segs.reduce((s2,sg)=>s2+segLenM(sg),0),0);
    mps=totalM/testTime;
    const g=seg.t==='grad'?seg.g2:seg.g;
    mps*=(GSPEED[g]||GSPEED.trot)/GSPEED.trot;
  }
  return(len/mps)*1000/speedMult;
}

function setMode(m){
  speedMode=m;
  ['uniform','relative','timed'].forEach(id=>document.getElementById('m-'+id).classList.toggle('active',id===m));
}
function setSpeed(v){
  speedMult=v/100;
  const d=speedMult<1?2:1;
  document.getElementById('spval').textContent=speedMult.toFixed(d).replace(/\.?0+$/,'')+'×';
}

// ═══════════════════════════════════════════════════
// ANIMATION ENGINE — single rAF loop, immediate pause
// ═══════════════════════════════════════════════════
let cur=0,segI=0,segT0=null,isPlaying=false,looping=false,animFrame=null;

// Fading trail: track when each move completed (performance.now() timestamp)
const moveCompletedAt=[];
const FADE_DURATION=4000;
const TRAIL_MIN=0.09;
const TRAIL_MAX=0.55;

function trailAlpha(moveIdx,now){
  const t=moveCompletedAt[moveIdx];
  if(t===null) return 0;
  const age=now-t;
  if(age>=FADE_DURATION) return TRAIL_MIN;
  return TRAIL_MAX - (TRAIL_MAX-TRAIL_MIN)*(age/FADE_DURATION);
}

function drawFullFrame(mIdx,sI,sP,now){
  now=now||performance.now();
  drawArena();

  // Previous moves fading trail
  for(let i=0;i<mIdx;i++){
    const alpha=trailAlpha(i,now);
    if(alpha>0.005) MOVES[i].segs.forEach(s=>drawSeg(s,1,alpha));
  }

  // Current move
  const mv=MOVES[mIdx];
  const isCoeff=mv.coeff>1;
  let pos=null,lastG='trot';

  mv.segs.forEach((s,i)=>{
    if(i<sI){drawSeg(s,1,1,isCoeff,now);pos=getSegPos(s,1);lastG=getSegGait(s,1);}
    else if(i===sI){drawSeg(s,sP,1,isCoeff,now);pos=getSegPos(s,sP);lastG=getSegGait(s,sP);}
  });

  drawHorse(pos,lastG,isCoeff,now);

  // ── PROXIMITY-BASED PROMPT ──────────────────────────
  const pe=document.getElementById('dp');
  if(mv.prompt&&mv.promptMarker&&pos){
    const pm=toC(mv.promptMarker[0],mv.promptMarker[1]);
    const distPx=Math.hypot(pos[0]-pm[0],pos[1]-pm[1]);
    const distM=distPx/SC; // convert back to metres
    const threshold=mv.promptDist||6;
    // Show prompt when within threshold metres of marker AND before passing it
    // "Before passing" = horse hasn't yet completed the segment containing the marker
    const pastMarker=isPastMarker(mv,mIdx,sI,sP,mv.promptMarker);
    if(distM<=threshold&&!pastMarker){
      pe.textContent=mv.prompt;pe.classList.add('show');
    } else if(pastMarker){
      pe.classList.remove('show');
    } else {
      pe.classList.remove('show');
    }
  } else {
    pe.classList.remove('show');
  }

  // ── COEFFICIENT PRE-WARNING ─────────────────────────
  // Show at end of preceding movement
  const nextMv=MOVES[mIdx+1];
  const coeffWarn=document.getElementById('coeff-warn');
  if(coeffWarn&&nextMv&&nextMv.coeff>1){
    const totalDur=mv.segs.reduce((s,sg)=>s+segDurMs(sg),0);
    let elapsed=0;
    for(let i=0;i<sI;i++) elapsed+=segDurMs(mv.segs[i]);
    elapsed+=sP*segDurMs(mv.segs[sI]||mv.segs[mv.segs.length-1]);
    const overall=totalDur>0?elapsed/totalDur:sP;
    if(overall>=0.85){
      coeffWarn.textContent=`⭐ Next: ×${nextMv.coeff} coefficient movement`;
      coeffWarn.style.display='block';
    } else {
      coeffWarn.style.display='none';
    }
  } else if(coeffWarn){
    coeffWarn.style.display='none';
  }

  // Overall progress for bar
  const totalDur=mv.segs.reduce((s,sg)=>s+segDurMs(sg),0);
  let elapsed=0;
  for(let i=0;i<sI;i++) elapsed+=segDurMs(mv.segs[i]);
  elapsed+=sP*segDurMs(mv.segs[sI]||mv.segs[mv.segs.length-1]);
  const overall=totalDur>0?elapsed/totalDur:sP;
  document.getElementById('pf').style.width=(overall*100)+'%';

  // Sub-step indicator
  updateSubStepUI(mIdx,sI,mv.segs.length);
}

// Check if horse has passed the prompt marker in the current movement
function isPastMarker(mv,mIdx,sI,sP,marker){
  // Find which segment contains the marker and whether we're past it
  const mx=marker[0],my=marker[1];
  for(let i=0;i<mv.segs.length;i++){
    const seg=mv.segs[i];
    if(seg.t==='line'||seg.t==='arc'||seg.t==='grad'){
      const pts=seg.pts||[];
      for(let j=0;j<pts.length;j++){
        if(Math.abs(pts[j][0]-mx)<0.1&&Math.abs(pts[j][1]-my)<0.1){
          // Marker is in this segment — are we past it?
          if(i<sI) return true; // segment fully complete
          if(i===sI){
            // Progress past the marker point within the segment
            const frac=j/(pts.length-1||1);
            return sP>frac;
          }
          return false;
        }
      }
    }
    if(seg.t==='circle'){
      // For circles, marker is the start point — past when progress > 0.9
      if(i<sI) return true;
      if(i===sI) return sP>0.9;
    }
  }
  return false;
}

function updateSubStepUI(mIdx,sI,totalSegs){
  const el=document.getElementById('substep');
  if(el) el.textContent=totalSegs>1?`sub-step ${sI+1}/${totalSegs}`:'';
}

function tick(now){
  if(!isPlaying&&segT0!==null){
    return;
  }
  if(segT0===null)segT0=now;
  const mv=MOVES[cur];

  while(segI<mv.segs.length){
    const seg=mv.segs[segI];
    const dur=segDurMs(seg);
    const el=now-segT0;
    if(el>=dur){segT0+=dur;segI++;}
    else{
      drawFullFrame(cur,segI,el/dur,now);
      animFrame=requestAnimationFrame(tick);
      return;
    }
  }

  // Move complete — record timestamp for fading trail
  if(moveCompletedAt[cur]===null) moveCompletedAt[cur]=now;
  drawFullFrame(cur,mv.segs.length-1,1,now);

  if(isPlaying){
    const next=cur+1;
    if(next<MOVES.length){
      cur=next;segI=0;segT0=now;
      updateDetail(cur);
      animFrame=requestAnimationFrame(tick);
    } else if(looping){
      // Reset completion times for clean loop
      for(let i=0;i<moveCompletedAt.length;i++) moveCompletedAt[i]=null;
      cur=0;segI=0;segT0=now;
      updateDetail(cur);
      animFrame=requestAnimationFrame(tick);
    } else {
      isPlaying=false;
      document.getElementById('pb').textContent='▶ Play';
    }
  }
}

function startAnim(idx,play){
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  cur=idx;segI=0;segT0=null;isPlaying=play;
  for(let i=idx;i<MOVES.length;i++) moveCompletedAt[i]=null;
  updateDetail(idx);
  animFrame=requestAnimationFrame(tick);
}

function togglePlay(){
  if(isPlaying){
    isPlaying=false;
    if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
    document.getElementById('pb').textContent='▶ Play';
    const mp=document.getElementById('mob-pb');if(mp)mp.textContent='▶';
  } else {
    if(cur>=MOVES.length-1)cur=0;
    isPlaying=true;
    document.getElementById('pb').textContent='⏸ Pause';
    const mp=document.getElementById('mob-pb');if(mp)mp.textContent='⏸';
    segT0=null;
    animFrame=requestAnimationFrame(tick);
  }
}

function toggleLoop(){
  looping=!looping;
  const b=document.getElementById('lb');
  b.textContent='↺ Loop: '+(looping?'On':'Off');
  b.classList.toggle('active',looping);
  const ml=document.getElementById('mob-lb');
  if(ml)ml.classList.toggle('loop-on',looping);
}

function userNext(){
  isPlaying=false;document.getElementById('pb').textContent='▶ Play';
  const mv=MOVES[cur];
  if(segI<mv.segs.length-1){
    // Advance to next sub-step within movement
    segI++;segT0=null;
    updateDetail(cur);
    animFrame=requestAnimationFrame(tick);
  } else if(cur<MOVES.length-1){
    // Move to next movement
    startAnim(cur+1,false);
  }
}

function userPrev(){
  isPlaying=false;document.getElementById('pb').textContent='▶ Play';
  if(segI>0){
    // Go back to previous sub-step within movement
    segI--;segT0=null;
    updateDetail(cur);
    animFrame=requestAnimationFrame(tick);
  } else if(cur>0){
    // Move to previous movement, start at its last sub-step
    const prevMv=MOVES[cur-1];
    startAnim(cur-1,false);
    // Jump to last seg of prev move
    segI=prevMv.segs.length-1;
    segT0=null;
  }
}

// ═══════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════
function updateDetail(i){
  const mv=MOVES[i];
  document.getElementById('dn').textContent=mv.n||'·';
  document.getElementById('dl').textContent=mv.label;
  document.getElementById('dd').textContent=mv.desc;
  const dd=document.getElementById('ddir');
  dd.textContent=mv.dir?'📋 '+mv.dir:'';
  dd.style.display=mv.dir?'':'none';
  const dc=document.getElementById('dc');
  if(mv.coeff>1){dc.textContent='×'+mv.coeff+' coefficient';dc.style.display='';}
  else dc.style.display='none';
  // Collect unique gaits
  const gaits=[];
  mv.segs.forEach(s=>{
    if(s.t==='grad'){if(!gaits.includes(s.g1))gaits.push(s.g1);if(!gaits.includes(s.g2))gaits.push(s.g2);}
    else if(s.g&&s.g!=='none'&&!gaits.includes(s.g))gaits.push(s.g);
    else if(s.t==='halt'&&!gaits.includes('halt'))gaits.push('halt');
  });
  document.getElementById('dg').innerHTML=gaits.map(g=>`<span class="pill ${g}">${GL[g]||g}</span>`).join('');
  document.getElementById('pt').textContent=`${mv.n||'·'} / ${MOVES[MOVES.length-1].n||MOVES.length-1}`;
  document.querySelectorAll('.mb').forEach((b,x)=>b.classList.toggle('active',x===i));
  document.querySelectorAll('.mb')[i]?.scrollIntoView({block:'nearest'});
  updateMobileUI(i);
}

function buildList(){
  const ml=document.getElementById('ml');ml.innerHTML='';
  MOVES.forEach((mv,i)=>{
    const b=document.createElement('button');
    b.className='mb'+(i===0?' active':'');
    b.innerHTML=`<span class="mn">${mv.n||'·'}</span><span style="flex:1;line-height:1.4;">${mv.label}</span><span class="mbr">${mv.coeff>1?`<span class="mbcoeff">×${mv.coeff}</span>`:''}</span>`;
    b.onclick=()=>{isPlaying=false;document.getElementById('pb').textContent='▶ Play';startAnim(i,false);};
    ml.appendChild(b);
  });
}

function init(){
  MOVES=getActiveMoves();
  for(let i=0;i<MOVES.length;i++) moveCompletedAt.push(null);
  sizeCanvas();
  buildList();
  initMobile();
  startAnim(0,false);
  document.getElementById('exit-toggle').classList.add('active');
}

// ─── MOBILE UI ────────────────────────────────────────
function isMobile(){
  return window.innerWidth<=680||window.screen.orientation?.type?.includes('portrait')||
    (window.innerHeight>window.innerWidth&&window.innerWidth<768);
}

let mobExpanded=false;
function toggleMobExpand(){
  mobExpanded=!mobExpanded;
  document.getElementById('mob-details').classList.toggle('show',mobExpanded);
  document.getElementById('mob-expand').textContent=mobExpanded?'▴':'▾';
}

function initMobile(){
  const mobile=isMobile();
  document.getElementById('mob-tests').style.display=mobile?'flex':'none';
  document.getElementById('mob-overlay').style.display=mobile?'flex':'none';
  document.getElementById('mob-controls').style.display=mobile?'flex':'none';
}

function updateMobileUI(i){
  if(!isMobile()) return;
  const mv=MOVES[i];
  document.getElementById('mob-num').textContent=mv.n||'·';
  document.getElementById('mob-label').textContent=mv.label;
  // Gait pills
  const gaits=[...new Set(mv.segs.map(s=>s.g||s.t).filter(g=>g&&g!=='none'))];
  if(mv.segs.some(s=>s.t==='halt')&&!gaits.includes('halt')) gaits.push('halt');
  document.getElementById('mob-pills').innerHTML=
    gaits.map(g=>`<span class="pill ${GS[g]||g}" style="font-size:10px;padding:2px 7px;">${GL[g]||g}</span>`).join('');
  // Details (directive)
  const det=document.getElementById('mob-details');
  det.textContent=mv.dir?'📋 '+mv.dir:'';
  det.style.display=mv.dir&&mobExpanded?'block':'none';
  // Play button sync
  const pb=document.getElementById('mob-pb');
  if(pb) pb.textContent=isPlaying?'⏸':'▶';
  // Loop button
  const lb=document.getElementById('mob-lb');
  if(lb) lb.classList.toggle('loop-on',looping);
  // Test buttons
  ['12','13','evb'].forEach(t=>{
    document.getElementById('mob-t'+t)?.classList.toggle('active',t===activeTest.replace('.',''));
  });
}

// Mobile UI syncs called directly from existing functions — no overrides needed

window.addEventListener('resize',()=>{
  sizeCanvas();
  initMobile();
  if(animFrame){cancelAnimationFrame(animFrame);animFrame=null;}
  segT0=null;startAnim(cur,isPlaying);
});

init();
</script>
